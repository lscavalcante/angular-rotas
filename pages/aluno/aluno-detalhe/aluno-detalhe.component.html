<div>
    <div class="form-group">
        <label for="inputAddress">Nome</label>
        <input [(ngModel)]="aluno.nome" type="text" class="form-control" id="inputNome" placeholder="Nome">
    </div>
    <div class="form-group">
        <label for="inputAddress2">Email</label>
        <input [(ngModel)]="aluno.email" type="text" class="form-control" id="inputEmail" placeholder="Email">
    </div>
    <button type="submit" (click)="cadastrar()" class="btn btn-primary">CADASTRAR</button>
</div>
